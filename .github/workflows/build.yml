name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build release app bundle
        run: ./build.sh

      - name: Zip app bundle
        run: ditto -c -k --sequesterRsrc --keepParent Spearo.app Spearo.app.zip

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spearo-app
          path: Spearo.app.zip
          if-no-files-found: error
